<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 목록 - 코드스쿼드 카페</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .card-header { background-color: #ffffff; border-bottom: none; border-radius: 1rem 1rem 0 0 !important; padding-top: 2rem; }
        .table-hover tbody tr:hover { background-color: #f1f3f5; }
        /* 링크 색상을 깔끔하게 조정합니다 */
        .profile-link { color: #0d6efd; text-decoration: none; transition: color 0.2s; }
        .profile-link:hover { color: #0a58ca; text-decoration: underline; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/users">멤버 목록</a>
            <a class="nav-link" href="/user/form">회원가입</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="card">
        <div class="card-header text-center">
            <h1 class="h3 mb-3 fw-bold text-primary">현재 멤버 목록</h1>
            <p class="text-muted">우리 카페의 소중한 멤버들을 소개합니다!</p>
        </div>
        <div class="card-body p-0">

            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col" class="ps-4">#</th>
                        <th scope="col">사용자 ID</th>
                        <th scope="col">이름</th>
                        <th scope="col">이메일</th>

                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user, stat : ${users}">
                        <th scope="row" class="ps-4" th:text="${stat.count}">1</th>
                        <td class="fw-bold text-secondary" th:text="${user.userId}">userId</td>

                        <td>
                            <a th:href="@{|/users/${user.userId}|}"
                               th:text="${user.name}"
                               class="profile-link fw-bold">이름</a>
                        </td>

                        <td th:text="${user.email}">email@example.com</td>

                    </tr>

                    <tr th:if="${users.isEmpty()}">
                        <td colspan="4" class="text-center py-5 text-muted">
                            아직 가입한 멤버가 없습니다.<br>
                            <a href="/user/form" class="btn btn-primary btn-sm mt-3 rounded-pill">첫 멤버 가입하기</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
