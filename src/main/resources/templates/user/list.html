<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('멤버 목록 - Java 카페')}"></head>
<style>
    /* 이 페이지 특화 스타일 */
    .table-hover tbody tr:hover { background-color: #f1f3f5; }
    .profile-link { color: #0d6efd; text-decoration: none; transition: color 0.2s; }
    .profile-link:hover { color: #0a58ca; text-decoration: underline; }
</style>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container my-5">
    <div class="card shadow-sm">
        <div class="card-header text-center bg-white border-0 pt-4">
            <h1 class="h3 mb-3 fw-bold text-primary">현재 멤버 목록</h1>
            <p class="text-muted">우리 카페의 소중한 멤버들을 소개합니다!</p>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 text-center">
                    <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 10%;">#</th>
                        <th scope="col" style="width: 30%;">사용자 ID</th>
                        <th scope="col" style="width: 30%;">이름</th>
                        <th scope="col" style="width: 30%;">이메일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user, stat : ${users}">
                        <th scope="row" th:text="${stat.count}">1</th>
                        <td class="fw-bold text-secondary" th:text="${user.userId}">userId</td>
                        <td>
                            <a th:href="@{/users/profile/{id}(id=${user.userId})}"
                               th:text="${user.name}" class="profile-link fw-bold">이름</a>
                        </td>
                        <td th:text="${user.email}">email@example.com</td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="4" class="text-center py-5 text-muted">
                            아직 가입한 멤버가 없습니다.<br>
                            <a href="/users/form" class="btn btn-primary btn-sm mt-3 rounded-pill px-3">첫 멤버 가입하기</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
