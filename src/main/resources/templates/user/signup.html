<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <style>
        div {
            border: 0px solid black;
            width: 90%;
        }

        input {
            width: 435px;
            height: 30px;
            font-size: 15px;
            padding: 5px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 7px;
        }

        .container {
            margin: auto;
            margin-top: 150px;
            width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 0.1px solid rgb(132, 130, 130);
            border-radius: 5px;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
        }

        .container > div {
            margin-bottom: 10px;
        }

        #sign-box {
            width: 100%;
            margin-top: 20px;
            margin-bottom: 40px;
            background-color: #4668CF;
            color: white;
            font-size: 20px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
        }

        #sign-box:hover {
            background-color: #5d80e8;
        }
    </style>
</head>

<body>
<div class="container">
    <h1 style="color:#4668CF; font-size: 40px;">SIGN UP</h1>

    <form action="/user/join" method="post">
        <!-- 아이디 -->
        <div class="id-box">
            <input type="text" id="user-name" name="loginId" placeholder="아이디" required>
        </div>

        <!-- 비밀번호 -->
        <div class="pw-box">
            <input type="password" id="user-password" name="password" placeholder="패스워드" required>
        </div>

        <!-- 성 -->
        <div class="last-name-box">
            <input type="text" id="user-last-name" name="lastName" placeholder="성" required>
        </div>

        <!-- 이름 -->
        <div class="first-name-box">
            <input type="text" id="user-first-name" name="firstName" placeholder="이름" required>
        </div>

        <!-- 이메일 -->
        <div class="email-box">
            <input type="email" id="user-email" name="email" placeholder="이메일" required>
        </div>

        <!-- 전화번호 -->
        <div class="phone-box">
            <input type="text" id="user-phone" name="phoneNumber" placeholder="핸드폰 번호" required>
        </div>

        <!-- 가입하기 -->
        <button id="sign-box" type="submit">Submit</button>
    </form>
</div>
</body>

</html>
