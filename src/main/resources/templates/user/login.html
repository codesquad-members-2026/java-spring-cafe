<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('로그인 - Java 카페')}"></head>
<style>
    /* 로그인 전용 레이아웃 스타일 */
    .login-container { max-width: 400px; margin-top: 100px; }
    .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); }
</style>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container login-container mb-5">
    <div class="card p-4">
        <h3 class="text-center fw-bold mb-4 text-primary">로그인</h3>

        <div th:if="${errorMessage}" class="alert alert-danger py-2 text-center" role="alert">
            <small th:text="${errorMessage}">아이디 또는 비밀번호가 틀렸습니다.</small>
        </div>

        <form action="/users/login" method="post">
            <div class="mb-3">
                <label for="userId" class="form-label fw-bold">사용자 아이디</label>
                <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">비밀번호</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">로그인</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">아직 회원이 아니신가요?</small>
            <a href="/users/form" class="text-decoration-none fw-bold ms-1">회원가입</a>
        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/" class="text-secondary text-decoration-none small">← 홈으로 돌아가기</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
