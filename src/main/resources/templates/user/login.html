<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java 카페 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
    </div>
</nav>

<div class="container login-container">
    <div class="card p-4">
        <h3 class="text-center fw-bold mb-4">로그인</h3>
        <div th:if="${errorMessage}" class="alert alert-danger py-2 text-center" role="alert">
            <small th:text="${errorMessage}">아이디 또는 비밀번호가 틀렸습니다.</small>
        </div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label for="userId" class="form-label">사용자 아이디</label>
                <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">로그인</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/users/form" class="text-decoration-none small">아직 회원이 아니신가요? 회원가입</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
