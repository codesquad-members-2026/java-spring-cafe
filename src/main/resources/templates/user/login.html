<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Log In</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #4e342e;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #5d4037;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
            color: #3e2723;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #8d6e63;
        }

        .error-banner {
            background-color: #ffebee;
            color: #c62828;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #ef9a9a;
            text-align: left;
        }

        button {
            width: 100%;
            background-color: #6d4c41;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 0.5rem;
        }
        button:hover {
            background-color: #5d4037;
        }

        .links-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .action-link {
            color: #8d6e63;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .action-link:hover {
            color: #5d4037;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Log In</h1>

    <form action="/user/login" method="post">

        <div th:if="${errorMessage}" class="error-banner">
            <span th:text="${errorMessage}">Invalid ID or Password</span>
        </div>

        <div class="form-group">
            <label for="id">User ID</label>
            <input type="text" id="id" name="id" placeholder="Enter your ID" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">LOG IN</button>
    </form>

    <div class="links-container">
        <a href="/user/signup" class="action-link">Don't have an account? Sign Up</a>
    </div>
</div>
</body>
</html>
