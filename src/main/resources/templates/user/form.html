<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('회원가입 - Java 카페')}"></head>
<style>
    /* 이 페이지에만 특화된 중앙 정렬 스타일 추가 */
    .form-signin { max-width: 450px; padding: 1rem; }
    .card-header { padding-top: 2rem; }
</style>
<body>

<main class="d-flex align-items-center min-vh-100">
    <div class="container form-signin">
        <div class="card shadow">
            <div class="card-header text-center bg-white border-0">
                <h1 class="h3 mb-3 fw-bold text-primary">Cafe 가입</h1>
                <p class="text-muted">새로운 커뮤니티의 일원이 되어보세요!</p>
            </div>

            <div class="card-body p-4">
                <form action="/users" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디" required>
                        <label for="userId">사용자 아이디</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호" required>
                        <label for="password">비밀번호</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="name" name="name" placeholder="이름" required>
                        <label for="name">이름</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="email" name="email" placeholder="이메일" required>
                        <label for="email">이메일 주소</label>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold" type="submit">가입하기</button>

                    <hr class="my-4">

                    <div class="text-center">
                        <small class="text-muted">이미 계정이 있으신가요?</small>
                        <a href="/users/loginForm" class="text-decoration-none ms-1 fw-bold">로그인</a>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="text-secondary text-decoration-none small">← 홈으로 돌아가기</a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
