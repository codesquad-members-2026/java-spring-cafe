<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 코드스쿼드 카페</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-signin { max-width: 450px; padding: 1rem; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .card-header { background-color: #ffffff; border-bottom: none; border-radius: 1rem 1rem 0 0 !important; padding-top: 2rem; }
        .form-floating>.form-control:focus~label::after { background-color: transparent; }
    </style>
</head>
<body>

<main class="d-flex align-items-center min-vh-100">
    <div class="container form-signin">
        <div class="card">
            <div class="card-header text-center">
                <h1 class="h3 mb-3 fw-bold text-primary">Cafe 가입</h1>
                <p class="text-muted">새로운 커뮤니티의 일원이 되어보세요!</p>
            </div>
                <div class="card-body p-4">

                    <form action="/users" method="post">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디" required>
                            <label for="userId">사용자 아이디</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호" required>
                            <label for="password">비밀번호</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="이름" required>
                            <label for="name">이름</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="email" name="email" placeholder="이메일" required>
                            <label for="email">이메일 주소</label>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 rounded-pill" type="submit">가입하기</button>

                    <hr class="my-4">

                    <div class="text-center">
                        <small class="text-muted">이미 계정이 있으신가요?</small>
                        <a href="#" class="text-decoration-none ms-1">로그인</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
