<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('회원정보 수정 - Java 카페')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container my-5" style="max-width: 500px;">
    <div class="card p-5 shadow-sm">
        <h2 class="text-center fw-bold text-primary mb-4">회원정보 수정</h2>

        <form th:action="@{/users/{id}/update(id=${user.userId})}" method="post">

            <div class="mb-3">
                <label class="form-label fw-bold">사용자 아이디</label>
                <input type="text" name="userId" class="form-control bg-light"
                       th:value="${user.userId}" readonly>
                <div class="form-text text-danger small">아이디는 변경할 수 없습니다.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">현재 비밀번호</label>
                <input type="password" name="password" class="form-control"
                       placeholder="본인 확인을 위해 비밀번호를 입력하세요" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">이름</label>
                <input type="text" name="name" class="form-control"
                       th:value="${user.name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">이메일</label>
                <input type="email" name="email" class="form-control"
                       th:value="${user.email}" required>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">수정 완료</button>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/users/profile/{id}(id=${user.userId})}" class="text-decoration-none text-secondary small">취소하고 프로필로 돌아가기</a>
            </div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
