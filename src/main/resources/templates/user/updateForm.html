<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java 카페 - 회원정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 80px; max-width: 500px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/users">멤버 목록</a>
            <a class="nav-link active" href="#">정보 수정</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="card p-5">
        <h2 class="text-center fw-bold text-primary mb-4">회원정보 수정</h2>


        <form th:action="@{/users/{id}/update(id=${user.userId})}" method="post">


            <div class="mb-3">
                <label class="form-label fw-bold">사용자 아이디</label>
                <input type="text" name="userId" class="form-control bg-light"
                       th:value="${user.userId}" readonly>
                <div class="form-text text-danger">아이디는 변경할 수 없습니다.</div>
            </div>


            <div class="mb-3">
                <label class="form-label fw-bold">현재 비밀번호</label>
                <input type="password" name="password" class="form-control"
                       placeholder="본인 확인을 위해 비밀번호를 입력하세요" required>
            </div>


            <div class="mb-3">
                <label class="form-label fw-bold">이름</label>
                <input type="text" name="name" class="form-control"
                       th:value="${user.name}" required>
            </div>


            <div class="mb-3">
                <label class="form-label fw-bold">이메일</label>
                <input type="email" name="email" class="form-control"
                       th:value="${user.email}" required>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg fw-bold">수정 완료</button>
            </div>
            <div class="text-center mt-3">
                <a href="/users" class="text-decoration-none">취소하고 돌아가기</a>
            </div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</html>
