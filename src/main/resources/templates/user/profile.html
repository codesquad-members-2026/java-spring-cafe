<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 프로필</title>
    <style>
        .profile-card {
            width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-family: sans-serif;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .info-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .info-group:last-of-type {
            border-bottom: none;
        }
        .label {
            font-size: 12px;
            color: #888;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        .value {
            font-size: 16px;
            color: #222;
        }
        .edit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            box-sizing: border-box;
        }
        .edit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>{{user.lastName}}{{user.firstName}}님의 프로필</h2>

    <div class="info-group">
        <span class="label">아이디</span>
        <span class="value">{{user.loginId}}</span>
    </div>

    <div class="info-group">
        <span class="label">이름</span>
        <span class="value">{{user.lastName}}{{user.firstName}}</span>
    </div>

    <div class="info-group">
        <span class="label">이메일</span>
        <span class="value">{{user.email}}</span>
    </div>

    <div class="info-group">
        <span class="label">전화번호</span>
        <span class="value">{{user.phoneNumber}}</span>
    </div>
</div>

</body>
</html>
