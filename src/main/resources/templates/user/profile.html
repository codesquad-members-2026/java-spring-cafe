<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('회원 프로필 - Java 카페')}"></head>
<style>
    /* 프로필 전용 특화 스타일 */
    .profile-container { max-width: 500px; margin-top: 50px; }
    .profile-header { background-color: #0d6efd; color: white; border-radius: 1rem 1rem 0 0; padding: 2rem; text-align: center; }
    .card { border-radius: 1rem; }
</style>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container profile-container mb-5">
    <div class="card shadow">
        <div class="profile-header">
            <div class="mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                </svg>
            </div>
            <h3 class="fw-bold mb-1" th:text="${user.name}">송원재</h3>
            <p class="mb-0 opacity-75" th:text="${user.email}">user@example.com</p>
        </div>

        <div class="card-body p-4">
            <div class="mb-3">
                <label class="text-muted small fw-bold">사용자 아이디</label>
                <div class="fs-5 fw-bold text-dark" th:text="${user.userId}">wonjae</div>
            </div>
            <hr class="text-muted opacity-25">

            <div class="mb-3">
                <label class="text-muted small fw-bold">이름</label>
                <div class="fs-5" th:text="${user.name}">송원재</div>
            </div>
            <hr class="text-muted opacity-25">

            <div class="mb-3">
                <label class="text-muted small fw-bold">이메일 주소</label>
                <div class="fs-5" th:text="${user.email}">user@example.com</div>
            </div>

            <div class="d-grid gap-2 mt-4"
                 th:if="${session.sessionedUser != null and session.sessionedUser.userId == user.userId}">
                <a th:href="@{/users/{id}/form(id=${user.userId})}" class="btn btn-primary fw-bold rounded-pill">
                    내 정보 수정하기
                </a>
            </div>

            <div class="d-grid gap-2 mt-2">
                <a href="/users" class="btn btn-outline-secondary rounded-pill">멤버 목록으로 돌아가기</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
