<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - User List</title>

    <th:block th:replace="~{fragments/header :: header-css}"></th:block>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            /* Removed align-items and padding from here so the header can span 100% width at the top */
            margin: 0;
            min-height: 100vh;
        }

        /* 2. CREATE A MAIN CONTENT WRAPPER FOR CENTERING */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem; /* Moved the padding here */
            width: 100%;
            box-sizing: border-box;
        }
        .error-banner {
            background-color: #ffebee;
            color: #c62828;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #ef9a9a;
            text-align: left;
        }

        .container {
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h3 {
            margin-top: 0;
            border-bottom: 2px solid #efebe9;
            padding-bottom: 1rem;
            color: #4e342e;
            font-size: 1.5rem;
        }
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
            margin-top: 1.5rem;
        }

        .user-item {
            background-color: #fafafa;
            padding: 1rem;
            border: 1px solid #efebe9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .user-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(109, 76, 65, 0.08);
            border-color: #d7ccc8;
        }

        .user-item::before {
            content: '☕';
            margin-right: 15px;
            font-size: 1.4rem;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-id { font-weight: 600; color: #4e342e; font-size: 1.05rem; }
        .user-email { font-size: 0.85rem; color: #8d6e63; margin-top: 0.15rem; }

        a.btn-return {
            text-decoration: none;
            background-color: #8d6e63;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.3s;
        }
        a.btn-return:hover { background-color: #6d4c41; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: main-header}"></div>

<div class="main-content">

    <div th:if="${errorMessage}" class="error-banner">
        <span th:text="${errorMessage}"> ERROR MESSAGE</span>
    </div>

    <div class="container">
        <h3>Cafe Members</h3>

        <div class="user-list">
            <a th:href="@{/user/{id}(id=${user.id})}" class="user-item" th:each="user : ${users}">
                <div class="user-info">
                    <span class="user-id" th:text="${user.id}"></span>
                    <span class="user-email" th:text="${user.email}"></span>
                </div>
            </a>

            <div th:if="${#lists.isEmpty(users)}" class="user-item" style="color: #9e9e9e; pointer-events: none;">
                No members yet. Be the first!
            </div>
        </div>

        <a href="/" class="btn-return">← Return Home</a>
    </div>

</div> </body>
</html>
