<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 프로필</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-page: #f5f5f3;
            --bg-card: #ffffff;
            --bg-input: #f9f9f8;
            --bg-row-hover: #fafaf9;
            --border-color: #e0e0dc;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-hint: #b0b0aa;
            --radius-md: 8px;
            --radius-xl: 16px;
        }

        body {
            background: var(--bg-page);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 2.5rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 1.75rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .page-header p {
            font-size: 13px;
            color: var(--text-hint);
            margin-top: 4px;
        }

        .back-btn {
            height: 36px;
            padding: 0 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 0.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, color 0.15s;
        }

        .back-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-card);
            border: 0.5px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .profile-top {
            padding: 32px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 0.5px solid var(--border-color);
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #e8e8e4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .profile-name {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .profile-email {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .info-list {
            padding: 0;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            padding: 18px 28px;
            border-bottom: 0.5px solid var(--border-color);
            transition: background 0.1s;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row:hover {
            background: var(--bg-row-hover);
        }

        .info-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-hint);
            letter-spacing: 0.04em;
            width: 120px;
            flex-shrink: 0;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div>
            <h1>회원 프로필</h1>
            <p>회원의 상세 정보를 확인합니다</p>
        </div>
        <a href="/users" class="back-btn">&#8592; 목록으로</a>
    </div>

    <div class="card">
        <div class="profile-top">
            <div>
                <div class="profile-name">{{name}}</div>
                <div class="profile-email">{{email}}</div>
            </div>
        </div>

        <div class="info-list">
            <div class="info-row">
                <span class="info-label">이름</span>
                <span class="info-value">{{name}}</span>
            </div>
            <div class="info-row">
                <span class="info-label">이메일</span>
                <span class="info-value">{{email}}</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
