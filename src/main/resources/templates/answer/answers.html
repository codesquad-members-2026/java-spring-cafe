<style>
    .answers-section {
        margin-top: 1.5rem;
    }

    .answers-header {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 0.75rem;
        padding: 0 2px;
    }

    .answers-header strong {
        color: var(--text-secondary);
        font-weight: 500;
    }

    .answer-item {
        padding: 1.25rem 1.5rem;
        border-bottom: 0.5px solid var(--border-color);
    }

    .answer-item:last-child {
        border-bottom: none;
    }

    .answer-meta {
        margin-bottom: 6px;
    }

    .answer-author {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
    }

    .answer-content {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.65;
        word-break: break-word;
    }

    .answers-empty {
        padding: 2.5rem 1rem;
        text-align: center;
        font-size: 14px;
        color: var(--text-hint);
    }

    .answer-form {
        margin-top: 0.75rem;
        padding: 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .answer-textarea {
        width: 100%;
        resize: none;
        background: var(--bg-input);
        border: 0.5px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 12px 14px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--text-primary);
        line-height: 1.6;
        transition: border-color 0.15s;
        outline: none;
    }

    .answer-textarea::placeholder {
        color: var(--text-hint);
    }

    .answer-textarea:focus {
        border-color: #aaa;
        background: var(--bg-card);
    }

    .answer-form-footer {
        display: flex;
        justify-content: flex-end;
    }

    .answer-submit-btn {
        height: 34px;
        padding: 0 18px;
        background: var(--text-primary);
        color: #ffffff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: opacity 0.15s;
    }

    .answer-submit-btn:hover {
        opacity: 0.75;
    }
</style>

{{#question}}
<div class="answers-section">
    <div class="answers-header">댓글 <strong>{{answersCount}}</strong></div>

    <div class="card">
        {{#answers}}
            <div class="answer-item">
                <div class="answer-meta">
                    <span class="answer-author">{{author}}</span>
                </div>
                <p class="answer-content">{{content}}</p>
            </div>
        {{/answers}}

        {{^answers}}
            <div class="answers-empty">아직 댓글이 없습니다</div>
        {{/answers}}
    </div>

        <form method="post" action="/questions/{{id}}/answers" class="card answer-form">
            <textarea class="answer-textarea" name="content" placeholder="댓글을 입력하세요" rows="3"></textarea>
            <div class="answer-form-footer">
                <button type="submit" class="answer-submit-btn">등록</button>
            </div>
        </form>
</div>
{{/question}}
