<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Java 카페 - 질문 상세보기')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container mb-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
        <span th:text="${successMessage}">성공 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
        <span th:text="${errorMessage}">에러 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card p-5 shadow-sm mt-3">
        <div class="article-header">
            <h2 class="fw-bold text-dark" th:text="${article.title}">게시글 제목</h2>
            <div class="text-muted d-flex justify-content-between align-items-center mt-3">
                <span>
                    작성자: <strong class="text-primary" th:text="${article.writer.name}">홍길동</strong>
                </span>
                <span class="badge bg-secondary">글 번호: [[${article.id}]]</span>
            </div>
        </div>

        <div class="article-content bg-light p-4 rounded mb-4" th:text="${article.contents}">
            본문 내용
        </div>

        <div class="d-flex justify-content-end pt-3 border-top gap-2">
            <a href="/" class="btn btn-outline-secondary">목록으로</a>

            <th:block th:if="${session.sessionedUser != null and session.sessionedUser.userId == article.writer.userId}">
                <a th:href="@{/articles/{id}/form(id=${article.id})}" class="btn btn-warning fw-bold">수정</a>
                <form th:action="@{/articles/{id}(id=${article.id})}" th:method="delete" style="display: inline;">
                    <button type="submit" class="btn btn-danger fw-bold"
                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                </form>
            </th:block>
        </div>
    </div>

    <div class="card mt-4 p-4 shadow-sm reply-section">
        <h5 class="fw-bold mb-3">댓글 <span class="text-primary" th:text="${#lists.size(article.replies)}">0</span></h5>

        <div th:if="${session.sessionedUser != null}" class="mb-4">
            <form th:action="@{/articles/{id}/replies(id=${article.id})}" method="post">
                <div class="mb-3">
                    <textarea class="form-control" name="contents" rows="3" placeholder="댓글을 입력하세요..." required></textarea>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary btn-sm">댓글 등록</button>
                </div>
            </form>
        </div>
        <div th:unless="${session.sessionedUser != null}" class="alert alert-light text-center border">
            댓글을 남기려면 <a href="/users/loginForm" class="text-primary fw-bold">로그인</a>이 필요합니다.
        </div>

        <hr>

        <div class="reply-list">
            <div th:each="reply : ${article.replies}" class="border-bottom py-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <strong class="text-dark" th:text="${reply.writer.name}">작성자</strong>
                    <small class="text-muted" th:text="${#temporals.format(reply.createDate, 'yyyy-MM-dd HH:mm')}">날짜</small>
                </div>
                <div class="text-muted" style="white-space: pre-wrap;" th:text="${reply.contents}">댓글 내용</div>

                <div th:if="${session.sessionedUser != null and session.sessionedUser.userId == reply.writer.userId}" class="text-end mt-2">
                    <form th:action="@{/articles/{aId}/replies/{rId}(aId=${article.id}, rId=${reply.id})}" th:method="delete" style="display: inline;">
                        <button type="submit" class="btn btn-link text-danger p-0 text-decoration-none"
                                style="font-size: 0.8rem;" onclick="return confirm('댓글을 삭제하시겠습니까?')">삭제</button>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(article.replies)}" class="text-center text-muted py-3">
                첫 번째 댓글을 남겨보세요!
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
