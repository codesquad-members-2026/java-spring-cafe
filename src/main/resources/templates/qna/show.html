<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java 카페 - 질문 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; max-width: 800px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .article-header { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .article-content { min-height: 200px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/users">멤버 목록</a>
            <a class="nav-link active" href="/">질문 게시판</a>
        </div>
    </div>
</nav>

<main class="container mb-5">
    <div class="card p-5 shadow-sm">
        <div class="article-header">
            <h2 class="fw-bold text-dark" th:text="${article.title}">게시글 제목</h2>
            <div class="text-muted d-flex justify-content-between align-items-center mt-3">
                <span>
                    작성자: <strong class="text-primary" th:text="${article.writer.name}">홍길동</strong>
                </span>
                <span class="badge bg-secondary">글 번호: [[${article.id}]]</span>
            </div>
        </div>

        <div class="article-content bg-light p-4 rounded mb-4" th:text="${article.contents}">
            본문 내용
        </div>

        <div class="d-flex justify-content-end pt-3 border-top gap-2">
            <a href="/" class="btn btn-outline-secondary">목록으로</a>

            <th:block th:if="${session.sessionedUser != null and session.sessionedUser.userId == article.writer.userId}">
                <a th:href="@{/articles/{id}/form(id=${article.id})}" class="btn btn-warning fw-bold">수정</a>

                <form th:action="@{/articles/{id}(id=${article.id})}" th:method="delete" style="display: inline;">
                    <button type="submit" class="btn btn-danger fw-bold"
                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                </form>
            </th:block>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
