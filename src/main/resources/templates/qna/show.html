<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 보기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #fcfcfc;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .article-box {
            width: 800px;
            background-color: white;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #4668CF;
            border-radius: 10px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .article-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .article-title {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 14px;
        }

        .article-writer {
            font-weight: bold;
            color: #4668CF;
        }

        /* 게시글 작성 시간 CSS 추가 */
        .article-time {
            color: #aaa;
            margin-left: 10px;
            font-size: 13px;
        }

        .article-content {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
            min-height: 300px;
            white-space: pre-wrap;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .left-btns, .right-btns {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: contrast(80%);
        }

        .btn-list {
            background-color: #eee;
            color: #656464;
        }

        .btn-edit {
            background-color: #4668CF;
            color: white;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }

        .inline-error {
            color: #e74c3c;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            padding-right: 5px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .comment-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed #ddd;
        }

        .comment-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            background-color: #f9f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .comment-textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: none;
            font-family: inherit;
        }

        .comment-textarea:focus {
            outline: none;
            border-color: #4668CF;
        }

        .comment-submit-row {
            display: flex;
            justify-content: flex-end;
        }

        .btn-comment-submit {
            background-color: #4668CF;
            color: white;
            padding: 8px 16px;
        }

        .comment-list {
            list-style: none;
        }

        .comment-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        /* 댓글 작성자 & 시간 묶음 그룹 */
        .comment-info-group {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .comment-item-writer {
            font-weight: bold;
            font-size: 14px;
            color: #4668CF;
        }

        /* 댓글 작성 시간 CSS 추가 */
        .comment-item-time {
            font-size: 12px;
            color: #999;
        }

        .comment-item-content {
            font-size: 15px;
            color: #444;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .btn-comment-delete {
            background: none;
            border: none;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        .btn-comment-delete:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="article-box">

        <div class="article-header">
            <h2 class="article-title">{{article.title}}</h2>
            <div class="article-meta">
                <span class="article-writer">{{article.writerLoginId}}</span>
                <div>
                    <span class="article-date">No. {{article.id}}</span>
                </div>
            </div>
        </div>

        <div class="article-content">{{article.contents}}</div>

        <div class="button-group">
            <div class="left-btns">
                <a href="/qna/list" class="btn btn-list">목록으로</a>
            </div>

            <div class="right-btns">
                {{#errorMessage}}
                <span class="inline-error">🚨 {{errorMessage}}</span>
                {{/errorMessage}}

                <a href="/qna/articles/{{article.id}}/edit" class="btn btn-edit">수정</a>

                <form action="/qna/articles/{{article.id}}/delete" method="post" style="margin: 0;">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit" class="btn btn-delete">삭제</button>
                </form>
            </div>
        </div>

        <div class="comment-section">
            <h3 class="comment-title">💬 댓글</h3>

            <form action="/qna/articles/{{article.id}}/comments" method="post" class="comment-form">
                <textarea name="contents" class="comment-textarea"
                          placeholder="타인을 존중하는 마음을 담아 댓글을 달아주세요!" required></textarea>
                <div class="comment-submit-row">
                    <button type="submit" class="btn btn-comment-submit">댓글 등록</button>
                </div>
            </form>

            <ul class="comment-list">
                {{#comments}}
                <li class="comment-item">
                    <div class="comment-item-header">
                        <div class="comment-info-group">
                            <span class="comment-item-writer">{{writerLoginId}}</span>
                            <span class="comment-item-time">{{createdTime}}</span>
                        </div>

                        <form action="/qna/articles/{{article.id}}/comments/{{id}}/delete" method="post" style="margin: 0;">
                            <input type="hidden" name="_method" value="DELETE" />
                            <button type="submit" class="btn-comment-delete">삭제</button>
                        </form>
                    </div>
                    <div class="comment-item-content">{{contents}}</div>
                </li>
                {{/comments}}
            </ul>
        </div>
    </div>
</div>

</body>
</html>
