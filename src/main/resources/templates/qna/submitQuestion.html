<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Ask a Question</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 400px; /* Made slightly wider for the text area */
            text-align: center;
        }
        h1 { margin-top: 0; font-size: 1.8rem; color: #4e342e; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea {
            resize: vertical; /* Lets the user drag the box taller if they need */
            min-height: 120px;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #8d6e63;
        }

        button {
            width: 100%;
            background-color: #6d4c41;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #5d4037; }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #8d6e63;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #5d4037; text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Post a Question</h1>

    <form action="/qna/question" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="What is your question?" required>
        </div>
        <div class="form-group">
            <label for="content">Details</label>
            <textarea id="content" name="content" placeholder="Explain your question in detail..." required></textarea>
        </div>

        <button type="submit">POST QUESTION</button>
    </form>

    <a href="/qna" class="back-link">← Cancel and return to Q&A</a>
</div>
</body>
</html>
