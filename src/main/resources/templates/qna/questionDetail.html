<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Question Detail</title>
    <th:block th:replace="~{fragments/header :: header-css}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .article-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .article-meta {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h1 {
            margin: 0 0 1.5rem 0;
            color: #4e342e;
            font-size: 2rem;
            line-height: 1.3;
            border-bottom: 2px solid #efebe9;
            padding-bottom: 1rem;
        }
        .article-content {
            font-size: 1.1rem;
            color: #5d4037;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
        }

        /* --- New Button Styles --- */
        .action-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .btn-return {
            display: inline-block;
            text-decoration: none;
            background-color: #8d6e63;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-return:hover {
            background-color: #6d4c41;
        }
        .btn-edit {
            display: inline-block;
            text-decoration: none;
            background-color: #5d4037; /* Darker brown for edit */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-edit:hover {
            background-color: #3e2723;
        }
        .btn-delete {
            background-color: #d32f2f; /* Muted red for delete */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-delete:hover {
            background-color: #b71c1c;
        }
        .delete-form {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: main-header}"></div>
<div class="main-content">
    <div class="article-card">
        <div class="article-meta">
            Question #<span th:text="${article.id}">1</span>
            By <span th:text="${article.author}" style="color: #4e342e;">doe</span>
        </div>

        <h1 th:text="${article.title}">Sample Question Title</h1>

        <div class="article-content" th:text="${article.content}">
            Here is where the detailed explanation of the question will go.
        </div>

        <div class="action-buttons">
            <a href="/qna/" class="btn-return">← Back</a>

            <a th:href="@{/qna/{id}/edit(id=${article.id})}" class="btn-edit">Edit</a>

            <form th:action="@{/qna/{id}/delete(id=${article.id})}" method="post" class="delete-form" onsubmit="return confirm('Are you sure you want to delete this question? This cannot be undone.');">
                <button type="submit" class="btn-delete">Delete</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
