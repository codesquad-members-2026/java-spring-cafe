<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #fcfcfc;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .list-box {
            width: 900px;
            background-color: white;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #4668CF;
            border-radius: 10px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .list-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .list-header h2 {
            color: #4668CF;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: #4668CF;
            color: white;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: contrast(80%);
        }

        .btn-write {
            background-color: #28a745;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        td.title-cell {
            text-align: center;
            padding-left: 30px;
        }

        th {
            color: #656464;
            font-weight: bold;
            background-color: #f4f6fd;
        }

        tr.article-row:hover {
            background-color: #f0f4ff;
            cursor: pointer;
        }

        .col-id { width: 10%; }
        .col-title { width: 50%; }
        .col-writer { width: 20%; }
        .col-date { width: 20%; }

    </style>
</head>
<body>

<div class="container">
    <div class="list-box">
        <div class="list-header">
            <h2>Q&A Board</h2>
            <div class="header-buttons">
                <a href="/qna/write" class="btn btn-write">글쓰기</a>
                <a href="/" class="btn">Home</a>
            </div>
        </div>

        <table>
            <thead>
            <tr>
                <th class="col-id">번호</th>
                <th class="col-writer">작성자</th>
                <th class="col-title">제목</th>
            </tr>
            </thead>
            <tbody>
            <!-- LAZY를 사용하는 것이 아니라 contents를 가져오지 않는 것이 성능 향상에 더 도움이 됌 -->
            {{#articles}}
                <tr class="article-row" onclick="location.href='/qna/articles/{{id}}'">
                    <td>{{id}}</td>
                    <td>{{writer.loginId}}</td>
                    <td class="title-cell">{{title}}</td>
                </tr>
            {{/articles}}
            </tbody>
        </table>
    </div>
</div>

</body>

<!--변경 예정-->
{{#errorMessage}}
<script>
    alert("{{errorMessage}}");
</script>
{{/errorMessage}}

</html>
