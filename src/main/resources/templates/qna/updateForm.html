<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>질문 수정 - Java 카페</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; margin-top: 50px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">질문 목록</a>
            <span class="navbar-text ms-3 text-white fw-bold" th:text="${session.sessionedUser.name}">사용자</span>
        </div>
    </div>
</nav>

<main class="container form-container mb-5">
    <div class="card">
        <div class="card-header text-center bg-white border-0 pt-5">
            <h1 class="h3 fw-bold text-primary">질문 수정하기</h1>
            <p class="text-muted small">기존 내용을 자유롭게 수정하세요.</p>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/articles/{id}(id=${article.id})}" th:method="put">

                <div class="mb-4 p-3 bg-light rounded border text-muted">
                    <label class="form-label fw-bold mb-0">작성자</label>
                    <div class="fs-5 fw-bold" th:text="${article.writer.name}">작성자 이름</div>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" class="form-control" id="title" name="title"
                           th:value="${article.title}" required>
                </div>

                <div class="mb-3">
                    <label for="contents" class="form-label fw-bold">내용</label>
                    <textarea class="form-control" id="contents" name="contents" rows="12"
                              th:text="${article.contents}" required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-warning fw-bold">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
