<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('질문 수정 - Java 카페')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container form-container mb-5">
    <div class="card shadow-sm">
        <div class="card-header text-center bg-white border-0 pt-5">
            <h1 class="h3 fw-bold text-primary">질문 수정하기</h1>
            <p class="text-muted small">기존 내용을 자유롭게 수정하세요.</p>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/articles/{id}(id=${article.id})}" th:method="put">

                <div class="mb-4 p-3 bg-light rounded border text-muted">
                    <label class="form-label fw-bold mb-0">작성자</label>
                    <div class="fs-5 fw-bold" th:text="${article.writer.name}">작성자 이름</div>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title"
                           th:value="${article.title}" placeholder="제목을 입력하세요" required>
                </div>

                <div class="mb-3">
                    <label for="contents" class="form-label fw-bold">내용</label>
                    <textarea class="form-control" id="contents" name="contents" rows="12"
                              th:text="${article.contents}" placeholder="내용을 입력하세요" required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-outline-secondary px-4">취소</a>
                    <button type="submit" class="btn btn-warning px-4 fw-bold">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
