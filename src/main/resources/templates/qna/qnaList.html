<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Q&A Board</title>
    <th:block th:replace="~{fragments/header :: header-css}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem; /* Moved the padding here */
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.2rem;
            color: #4e342e;
            margin-bottom: 2rem;
        }
        .article-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .article-card {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(109, 76, 65, 0.08);
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s; /* Made the shadow transition smooth too! */
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(109, 76, 65, 0.12);
        }
        .article-meta {
            font-size: 0.85rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .article-title {
            margin: 0 0 0.8rem 0;
            font-size: 1.4rem;
            color: #4e342e;
        }
        .article-content {
            margin: 0;
            line-height: 1.5;
            color: #5d4037;
        }
        .empty-state {
            text-align: center;
            color: #8d6e63;
            font-style: italic;
            padding: 2rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #8d6e63;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.2rem;
            color: #4e342e;
            margin: 0;
        }
        .btn-primary {
            background-color: #6d4c41;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #5d4037;
        }
        .back-link:hover { color: #5d4037; text-decoration: underline; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: main-header}"></div>

<div class="main-content">
<div class="header-container">
    <h1>Cafe Q&A Board</h1>
    <a href="/qna/question" class="btn-primary">Ask a Question</a>
</div>


<div class="article-container">

    <div th:if="${#arrays.isEmpty(articles)}" class="article-card empty-state">
        <p>No questions have been asked yet. Be the first!</p>
    </div>

    <a th:href="@{/qna/{id}(id=${article.id})}"  class="article-card" th:each="article : ${articles}" >
        <div class="article-meta" th:text="'Question #' + ${article.id}">Question #ID</div>
        <h2 class="article-title" th:text="${article.title}">Sample Title</h2>
    </a>

</div>

<a href="/" class="back-link">← Return Home</a>
</div>
</body>
</html>
