<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>질문하기 - Java 카페</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; margin-top: 50px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .card-header { background-color: #ffffff; border-bottom: none; border-radius: 1rem 1rem 0 0 !important; padding: 2rem 2rem 0; }
        .btn-primary { border-radius: 0.5rem; padding: 0.6rem 1.5rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link" href="/">질문 목록</a>
            <a class="nav-link" href="/users">멤버 목록</a>
            <th:block th:if="${session.sessionedUser != null}">
                <span class="navbar-text ms-3 text-white fw-bold">
                    <span th:text="${session.sessionedUser.name}">사용자</span>님
                </span>
                <a class="nav-link" href="/users/logout">로그아웃</a>
            </th:block>
        </div>
    </div>
</nav>

<main class="container form-container mb-5">
    <div class="card shadow-sm">
        <div class="card-header text-center bg-white border-0 pt-5">
            <h1 class="h3 fw-bold text-primary">새 질문 작성</h1>
        </div>

        <div class="card-body p-4">
            <form action="/questions" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title"
                           placeholder="무엇이 궁금하신가요?" required>
                </div>

                <div class="mb-3">
                    <label for="contents" class="form-label fw-bold">내용</label>
                    <textarea class="form-control" id="contents" name="contents" rows="12"
                              placeholder="상세한 내용을 입력해 주세요." required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/" class="btn btn-light px-4">취소</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">질문 등록하기</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
