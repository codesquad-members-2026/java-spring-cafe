<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('질문하기 - Java 카페')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container form-container mb-5">
    <div class="card shadow-sm">
        <div class="card-header text-center bg-white border-0 pt-5">
            <h1 class="h3 fw-bold text-primary">새 질문 작성</h1>
        </div>

        <div class="card-body p-4">
            <form action="/questions" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title"
                           placeholder="무엇이 궁금하신가요?" required>
                </div>

                <div class="mb-3">
                    <label for="contents" class="form-label fw-bold">내용</label>
                    <textarea class="form-control" id="contents" name="contents" rows="12"
                              placeholder="상세한 내용을 입력해 주세요." required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/" class="btn btn-light px-4">취소</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">질문 등록하기</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
