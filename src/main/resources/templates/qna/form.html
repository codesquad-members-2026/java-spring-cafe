<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <style>
        /* 기존 베이스 감성 그대로 유지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #fcfcfc;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .form-box {
            width: 800px;
            background-color: white;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #4668CF; /* 블루 포인트 유지 */
            border-radius: 10px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .form-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #4668CF;
            font-size: 28px;
        }

        /* 폼 입력창 디자인 추가 */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            color: #656464;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            background-color: #fcfcfc; /* 배경과 살짝 통일감 */
        }

        /* 클릭(포커스) 했을 때 메인 컬러로 테두리 변경 */
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #4668CF;
            background-color: #fff;
        }

        .input-group textarea {
            resize: vertical; /* 위아래로만 늘어날 수 있게 */
            min-height: 300px; /* 본문 작성란은 넉넉하게 */
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            justify-content: flex-end; /* 오른쪽 정렬 */
            gap: 15px; /* 버튼 사이 간격 */
            margin-top: 20px;
        }

        /* 기존 btn-home 스타일을 상속받은 버튼들 */
        .btn {
            border: none;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: contrast(80%);
        }

        .btn-submit {
            background-color: #4668CF;
            color: white;
        }

        .btn-cancel {
            background-color: #eee;
            color: #656464;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <div class="form-header">
            <h2>Write a Post</h2>
            <a href="/" class="btn btn-submit">Home</a>
        </div>

        <form action="/questions" method="post">

            <div class="input-group">
                <label for="writer">작성자</label>
                <input type="text" id="writer" name="writer" value="익명" readonly>
            </div>

            <div class="input-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" placeholder="제목을 입력해 주세요" required>
            </div>

            <div class="input-group">
                <label for="contents">내용</label>
                <textarea id="contents" name="contents" placeholder="자유롭게 글을 작성해 주세요" required></textarea>
            </div>

            <div class="button-group">
                <a href="/" class="btn btn-cancel">취소</a>
                <button type="submit" class="btn btn-submit">작성완료</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
