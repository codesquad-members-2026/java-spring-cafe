<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #fcfcfc;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .form-box {
            width: 800px;
            background-color: white;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #4668CF;
            border-radius: 10px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .form-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #4668CF;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            color: #656464;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            background-color: #fcfcfc;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #4668CF;
            background-color: #fff;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 300px;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: contrast(80%);
        }

        .btn-submit {
            background-color: #4668CF;
            color: white;
        }

        .btn-cancel {
            background-color: #eee;
            color: #656464;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <div class="form-header">
            <h2>Edit a Post</h2>
            <a href="/" class="btn btn-submit">Home</a>
        </div>

        <form action="/qna/edit" method="post">
            <input type="hidden" name="_method" value="PUT" />

            {{#article}}
                <div class="input-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" value={{title}} required>
                </div>

                <div class="input-group">
                    <label for="contents">내용</label>
                    <textarea id="contents" name="contents" required>{{contents}}</textarea>
                </div>
            {{/article}}

            <div class="button-group">
                <a href="/qna/list" class="btn btn-cancel">취소</a>
                <button type="submit" class="btn btn-submit">수정완료</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
