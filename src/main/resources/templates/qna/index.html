<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Java 카페 - 질문 게시판')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-3" th:if="${errorMessage}">
    <div class="alert alert-danger alert-dismissible fade show text-center" role="alert">
        <strong th:text="${errorMessage}">에러 메시지 내용</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<main class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">질문 게시판</h2>
            <a href="/questions/form" class="btn btn-primary">글쓰기</a>
        </div>

        <table class="table table-hover text-center">
            <thead>
            <tr>
                <th scope="col" style="width: 10%;">번호</th>
                <th scope="col" style="width: 50%;">제목</th>
                <th scope="col" style="width: 20%;">글쓴이</th>
                <th scope="col" style="width: 20%;">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="article : ${articles}">
                <td th:text="${article.id}">1</td>
                <td class="text-center">
                    <a th:href="@{/articles/{id}(id=${article.id})}"
                       th:text="${article.title}"
                       class="text-decoration-none text-dark fw-bold">
                        질문 제목
                    </a>
                </td>
                <td th:text="${article.writer.name}">작성자</td>
                <td>
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-sm btn-outline-secondary">보기</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(articles)}">
                <td colspan="4" class="text-muted py-5">아직 등록된 질문이 없습니다. 첫 질문을 남겨보세요!</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
