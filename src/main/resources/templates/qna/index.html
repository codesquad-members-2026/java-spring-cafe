<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java 카페 - 질문 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/users">멤버 목록</a>
            <a class="nav-link" href="/questions/form">질문하기</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">질문 게시판</h2>
            <a href="/questions/form" class="btn btn-primary">글쓰기</a>
        </div>

        <table class="table table-hover text-center">
            <thead>
            <tr>
                <th scope="col" style="width: 10%;">번호</th>
                <th scope="col" style="width: 50%;">제목</th>
                <th scope="col" style="width: 20%;">글쓴이</th>
                <th scope="col" style="width: 20%;">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="article : ${articles}">
                <td th:text="${article.id}">1</td>

                <td class="text-center">
                    <a th:href="@{/articles/{id}(id=${article.id})}"
                       th:text="${article.title}"
                       class="text-decoration-none text-dark fw-bold">
                        질문 제목
                    </a>
                </td>

                <td th:text="${article.writer}">작성자</td>
                <td>
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-sm btn-outline-secondary">보기</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(articles)}">
                <td colspan="4" class="text-muted py-5">아직 등록된 질문이 없습니다. 첫 질문을 남겨보세요!</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
