<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Java 카페</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        /* 상세 페이지 전용 스타일 */
        .container { margin-top: 50px; max-width: 800px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .article-header { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .article-content { min-height: 200px; white-space: pre-wrap; line-height: 1.6; }
        .reply-section { background-color: #ffffff; }
        /* 폼 페이지 전용 스타일 */
        .form-container { max-width: 700px; margin-top: 50px; }
        .card-header { background-color: #ffffff; border-bottom: none; border-radius: 1rem 1rem 0 0 !important; padding: 2rem 2rem 0; }
        .btn-primary { border-radius: 0.5rem; padding: 0.6rem 1.5rem; }
    </style>
</head>

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">Cafe</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="/">질문 목록</a>
                <a class="nav-link" href="/users">멤버 목록</a>

                <th:block th:if="${session.sessionedUser == null}">
                    <a class="nav-link" href="/users/loginForm">로그인</a>
                    <a class="nav-link" href="/users/form">회원가입</a>
                </th:block>

                <th:block th:if="${session.sessionedUser != null}">
                    <a class="nav-link" href="/questions/form">질문하기</a>
                    <a class="nav-link" th:href="@{/users/{userId}/form(userId=${session.sessionedUser.userId})}">개인정보수정</a>
                    <a class="nav-link" href="/users/logout">로그아웃</a>
                    <span class="navbar-text ms-3 text-white fw-bold">
                            <span th:text="${session.sessionedUser.name}">사용자</span>님 환영합니다!
                        </span>
                </th:block>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
