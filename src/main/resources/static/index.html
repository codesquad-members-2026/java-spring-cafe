<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            position: relative;
        }

        .box {
            margin: auto;
            width: 500px;
            height: 300px;
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translate(-50%, 0);
            border-radius: 10px;
            display: flex;
        }

        .login-box{
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: start;
            padding-left: 20px;
            box-shadow: 0 0px 70px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #4668CF;
        }

        .info-box{
            display: flex;
            flex-direction: column;
        }

        #inputId{
            margin-top: 40px;
            margin-bottom: 10px;
            font-size: 15px;
            border-radius: 5px;
            padding: 5px;
        }

        #inputPw{
            font-size: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            padding: 5px;
        }

         #loginBtn{
            background-color: #4668CF;
            color: white;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            width: 100%;
            cursor: pointer;
            font-size: large;
        }

        #loginBtn:hover{
            filter: contrast(80%);
        }

        #listBtn{
            background-color: #4668CF;
            color: white;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            width: 100%;
            cursor: pointer;
            font-size: large;
        }

        .sign-box{
            width: 40%;
            box-shadow: 0 0px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .signBtn{
            margin-top: 10px;
            border: 2px solid rgb(191, 191, 191);
            padding: 5px;
            border-radius: 10px;
            cursor: pointer;
        }

        .signBtn a{
            text-align: center;
            font-weight: 100;
            font-size: 18px;
            color: rgb(73, 73, 73);
            text-decoration: none;
        }

        .signBtn:hover{
            filter: opacity(0.6);
        }

    </style>
</head>

<body>
<div class="container">
    <div class="box">
        <div class="login-box">
            <div class="info-box">
                <h2 style="color: #4668CF; font-size: 30px;">Log in</h2>
                <input id="inputId" type="id" placeholder="아이디">
                <input id="inputPw" type="password" placeholder="비밀번호">
                <div><button id="loginBtn">Login</button></div>
            </div>
        </div>

        <div class="sign-box">
            <p style="color:#656464; font-size: 15px;">Don't have an account?</p>
            <div class="signBtn"><a href="/membership">Sign Up</a></div>
            <div class="signBtn"><a href="/users">User List</a></div>
        </div>
    </div>
</div>
</body>

</html>
