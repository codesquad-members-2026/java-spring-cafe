<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-page: #f5f5f3;
            --bg-card: #ffffff;
            --bg-input: #f9f9f8;
            --border-color: #e0e0dc;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-hint: #b0b0aa;
            --radius-md: 8px;
            --radius-xl: 16px;
        }

        body {
            background: var(--bg-page);
            font-family: 'DM Sans', sans-serif;
        }

        .signup-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .signup-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 0.5px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
        }

        .signup-header {
            margin-bottom: 2rem;
        }

        .signup-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .signup-header p {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-input);
            border: 0.5px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: #888;
            box-shadow: 0 0 0 3px rgba(128, 128, 128, 0.08);
        }

        .form-group input::placeholder {
            color: var(--text-hint);
        }

        .divider {
            height: 0.5px;
            background: var(--border-color);
            margin: 1.75rem 0;
        }

        .submit-btn {
            width: 100%;
            height: 44px;
            background: var(--text-primary);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.15s;
        }

        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:active { opacity: 0.7; }

        .login-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 0.5px solid #888;
        }
    </style>
</head>
<body>

<div class="signup-wrap">
    <div class="signup-card">
        <div class="signup-header">
            <h1>회원가입</h1>
            <p>아래 정보를 입력해 계정을 만드세요</p>
        </div>

        <form action="/users" method="post">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동">
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력하세요">
            </div>

            <div class="divider"></div>

            <button type="submit" class="submit-btn">가입하기</button>
        </form>

        <p class="login-link">이미 계정이 있으신가요? <a href="/user/login">로그인</a></p>
    </div>
</div>

</body>
</html>
